name: chitchat
description: A new Flutter project.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.1.3 <4.0.0"

dependencies:
  cupertino_icons: ^1.0.6
  flutter:
    sdk: flutter
  
  story_view: ^0.14.0
  custom_clippers: ^2.0.0
  animated_splash_screen: ^1.3.0

dev_dependencies:
  flutter_launcher_icons: "^0.13.1"
  flutter_lints: ^2.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: "icon"
  ios: true
  image_path: "img/front.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - img/logo.png
    - img/logo1.png
    - img/google.png
    - img/front.png
    - img/logo11.png
    - img/other.png
    - img/ana.jpeg
    - img/berta.jpg
    - img/kaya.jpg
    - img/margot.jpg
